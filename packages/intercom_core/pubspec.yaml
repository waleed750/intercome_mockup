name: intercom_core
description: Core intercom protocol, call engine, and platform channels for SyncN intercom apps.
version: 0.1.0
publish_to: none

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.3.0
  permission_handler: ^11.0.0
  connectivity_plus: ^6.0.0
  provider: ^6.1.0
  flutter_local_notifications: ^18.0.0
  vibration: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.syncn.intercom
        pluginClass: IntercomPlugin
      ios:
        pluginClass: IntercomPlugin
